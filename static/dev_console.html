<!-- static/dev_console.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Dev Console</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background:#0f172a; color:#e2e8f0; }
  h1 { font-size: 1.2rem; }
  .row { display:flex; gap:1rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
  button { padding:.5rem 1rem; border-radius:.4rem; border:0; cursor:pointer; font-weight:600; }
  #start { background:#22c55e; color:#06210f; }
  #start.stop { background:#ef4444; color:#2a0606; }
  #status { font-weight:600; }
  .panes { display:flex; gap:1rem; flex-wrap:wrap; }
  .pane { flex:1 1 320px; background:#1e293b; border-radius:.5rem; padding:.75rem; min-height:240px; }
  .pane h2 { font-size:.9rem; margin:.2rem 0 .6rem; color:#94a3b8; }
  .turn { margin:.3rem 0; }
  .turn.user { color:#7dd3fc; }
  .turn.agent { color:#86efac; }
  pre { white-space:pre-wrap; word-break:break-word; margin:0; font-size:.85rem; }
  .hint { color:#94a3b8; font-size:.8rem; }
  label { font-size:.85rem; }
</style>
</head>
<body>
  <h1>Voice Dev Console <span class="hint">— use headphones to avoid echo</span></h1>
  <div class="row">
    <button id="start">Start</button>
    <label>Lead name <input id="leadName" value="Raju" placeholder="e.g. Raju" style="width:8rem" /></label>
    <label><input type="checkbox" id="halfDuplex" /> Mute mic while agent speaks <span class="hint">(turn on for speakers)</span></label>
    <label><input type="checkbox" id="bargeIn" /> Allow interruptions (experimental)</label>
    <span id="status">idle</span>
  </div>
  <div class="panes">
    <div class="pane">
      <h2>Transcript</h2>
      <div id="transcript"></div>
    </div>
    <div class="pane">
      <h2>Dialogue state &amp; slots</h2>
      <pre id="state">—</pre>
      <div id="outcome" style="margin-top:12px; padding:8px; border:1px solid #333; border-radius:6px; display:none;">
        <div><b>Outcome:</b> <span id="outcomeType"></span> <span id="outcomeSource" style="color:#888;"></span></div>
        <div style="margin-top:4px;"><b>Summary:</b> <span id="outcomeSummary"></span></div>
        <div style="margin-top:4px;"><b>Notes:</b> <span id="outcomeNotes"></span></div>
        <div id="outcomeCallback" style="margin-top:4px;"></div>
      </div>
    </div>
  </div>

<script>
const TARGET_RATE = 16000;
let ws, audioCtx, micStream, workletNode, playCursor = 0, agentSpeaking = false, running = false;
const activeSources = new Set();   // scheduled playback nodes, so we can stop them

const $ = (id) => document.getElementById(id);
const setStatus = (s) => { $("status").textContent = s; };

function addTranscript(role, text) {
  const div = document.createElement("div");
  div.className = "turn " + role;
  div.textContent = (role === "user" ? "🧑 " : "🤖 ") + text;
  $("transcript").appendChild(div);
  $("transcript").scrollTop = $("transcript").scrollHeight;
}

let _partialEl = null;
function renderPartial(text) {
  if (!text) {
    if (_partialEl) { _partialEl.remove(); _partialEl = null; }
    return;
  }
  if (!_partialEl) {
    _partialEl = document.createElement("div");
    _partialEl.className = "turn user";
    _partialEl.style.opacity = "0.55";
    _partialEl.style.fontStyle = "italic";
    $("transcript").appendChild(_partialEl);
  }
  _partialEl.textContent = "🎙 " + text;
  $("transcript").scrollTop = $("transcript").scrollHeight;
}

// Downsample Float32 @ctxRate -> Int16 @16k via nearest-neighbour sampling.
function downsampleToInt16(float32, inRate) {
  if (inRate === TARGET_RATE) {
    const out = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return out;
  }
  const ratio = inRate / TARGET_RATE;
  const outLen = Math.floor(float32.length / ratio);
  const out = new Int16Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const s = Math.max(-1, Math.min(1, float32[Math.floor(i * ratio)]));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return out;
}

// Schedule Int16 PCM @16k for gapless playback.
let _playN = 0;
function playPcm16(int16) {
  const buf = audioCtx.createBuffer(1, int16.length, TARGET_RATE);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < int16.length; i++) ch[i] = int16[i] / 0x8000;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  // Free the node when it finishes so a long call doesn't accumulate nodes.
  src.onended = () => { activeSources.delete(src); try { src.disconnect(); } catch (_) {} };
  activeSources.add(src);
  const now = audioCtx.currentTime;
  const underrun = playCursor < now;
  if (underrun) playCursor = now;
  src.start(playCursor);
  playCursor += buf.duration;
  if ((++_playN) % 25 === 0) {
    console.log(`[playback] n=${_playN} ctxRate=${audioCtx.sampleRate} gap=${(playCursor - now).toFixed(2)}s${underrun ? " UNDERRUN" : ""}`);
  }
}

function stopPlayback() {
  for (const s of activeSources) { try { s.stop(); s.disconnect(); } catch (_) {} }
  activeSources.clear();
  playCursor = audioCtx.currentTime;   // nothing scheduled ahead anymore
}

function sendBargeConfig() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: "config", barge: $("bargeIn").checked }));
}
$("bargeIn").addEventListener("change", sendBargeConfig);

const WORKLET_CODE = `
class CaptureProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const input = inputs[0];
    if (input && input[0]) this.port.postMessage(input[0].slice(0));
    return true;
  }
}
registerProcessor('capture-processor', CaptureProcessor);
`;

async function start() {
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const leadName = ($("leadName").value || "").trim();
  const qs = "tenant=dev" + (leadName ? "&lead_name=" + encodeURIComponent(leadName) : "");
  ws = new WebSocket(`${wsProto}://${location.host}/api/v1/dev/voice?${qs}`);
  ws.binaryType = "arraybuffer";

  ws.onopen = async () => {
    console.log("[devconsole] ws open; sending hello + wiring audio");
    ws.send(JSON.stringify({ type: "hello", tenant: "dev" }));
    sendBargeConfig();
    try {
      // micStream + audioCtx were already acquired during the click gesture.
      const blobUrl = URL.createObjectURL(new Blob([WORKLET_CODE], { type: "application/javascript" }));
      await audioCtx.audioWorklet.addModule(blobUrl);
      const srcNode = audioCtx.createMediaStreamSource(micStream);
      workletNode = new AudioWorkletNode(audioCtx, "capture-processor");
      workletNode.port.onmessage = (e) => {
        if (!running) return;
        const stillPlaying = playCursor > audioCtx.currentTime + 0.05;
        const speaking = agentSpeaking || stillPlaying;
        // Half-duplex (speakers): mute the mic while the agent speaks. Skipped
        // when barge-in is on — the server needs the mic to hear interruptions
        // (headphones, no echo). Server-side detection replaces the old client VAD.
        if ($("halfDuplex").checked && speaking && !$("bargeIn").checked) return;
        const int16 = downsampleToInt16(e.data, audioCtx.sampleRate);
        if (ws.readyState === WebSocket.OPEN) ws.send(int16.buffer);
      };
      srcNode.connect(workletNode);
      // Worklet needs a sink to pull; route through a muted gain so we don't echo.
      const sink = audioCtx.createGain();
      sink.gain.value = 0;
      workletNode.connect(sink).connect(audioCtx.destination);
      running = true;
      console.log("[devconsole] audio ready; mic streaming, listening");
      setStatus("connected");
    } catch (err) {
      console.error("[devconsole] audio worklet setup FAILED:", err);
      setStatus("audio error: " + (err && err.message ? err.message : err));
      stop();
    }
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      playPcm16(new Int16Array(e.data));
      return;
    }
    const msg = JSON.parse(e.data);
    if (msg.type === "status") {
      setStatus(msg.status);
      // Mute the mic whenever the agent is busy (synthesizing the opening,
      // thinking, or speaking) — not only while audio streams. Otherwise the
      // mic captures noise during those windows and the agent answers itself.
      agentSpeaking = (msg.status !== "listening");
    } else if (msg.type === "interrupt") {
      stopPlayback();            // server detected a barge: flush buffered audio now
      agentSpeaking = false;
    } else if (msg.type === "partial") {
      renderPartial(msg.text);
    } else if (msg.type === "transcript") {
      if (msg.role === "user") renderPartial("");  // final replaces the live line
      addTranscript(msg.role, msg.text);
    } else if (msg.type === "state") {
      $("state").textContent =
        "state: " + msg.state + "\nslots: " + JSON.stringify(msg.slots, null, 2);
    } else if (msg.type === "outcome") {
      $("outcome").style.display = "block";
      $("outcomeType").textContent = msg.outcome;
      $("outcomeSource").textContent = msg.source ? "(" + msg.source + ")" : "";
      $("outcomeSummary").textContent = msg.summary || "—";
      $("outcomeNotes").textContent = msg.notes || "—";
      $("outcomeCallback").textContent = msg.callback_datetime
        ? "Callback: " + msg.callback_datetime
        : (msg.callback_phrase ? "Callback (unresolved): " + msg.callback_phrase : "");
    } else if (msg.type === "error") {
      console.error("[devconsole] turn error:", msg.message);
      const div = document.createElement("div");
      div.className = "turn";
      div.style.color = "#fca5a5";
      div.textContent = "⚠ " + msg.message;
      $("transcript").appendChild(div);
      $("transcript").scrollTop = $("transcript").scrollHeight;
    }
  };

  ws.onclose = (e) => { console.warn("[devconsole] ws CLOSED code=", e.code, "reason=", e.reason, "wasClean=", e.wasClean); stop(); setStatus("closed"); };
  ws.onerror = (e) => { console.error("[devconsole] ws ERROR", e); setStatus("connection error"); };
}

function stop() {
  running = false;
  if (workletNode) { try { workletNode.disconnect(); } catch (_) {} }
  workletNode = null;
  if (micStream) micStream.getTracks().forEach((t) => t.stop());
  micStream = null;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  agentSpeaking = false;
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();
  $("start").classList.remove("stop");
  $("start").textContent = "Start";
}

// Graceful end: ask the server to finalize and push the outcome while the
// socket is still open, then let the server close it (onclose -> stop()).
// Halts the mic immediately but keeps the ws open to receive the outcome panel.
function endCall() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { stop(); return; }
  running = false;  // stop streaming mic frames at once
  if (workletNode) { try { workletNode.disconnect(); } catch (_) {} }
  workletNode = null;
  if (micStream) micStream.getTracks().forEach((t) => t.stop());
  micStream = null;
  agentSpeaking = false;
  $("start").classList.remove("stop");
  $("start").textContent = "Start";
  setStatus("ending…");
  ws.send(JSON.stringify({ type: "end" }));
  // Fallback: if the server hasn't closed within 6s, force teardown.
  setTimeout(() => { if (ws && ws.readyState === WebSocket.OPEN) stop(); }, 6000);
}

$("start").onclick = async () => {
  if (running) { endCall(); return; }
  // Acquire the mic + audio context DURING the click gesture, before opening the
  // WebSocket. This ties the permission prompt to the user gesture (strict
  // browsers deny a mic request made later, from ws.onopen) and lets us surface
  // a denial clearly without opening a doomed connection.
  setStatus("requesting microphone…");
  try {
    // Run the context AT 16 kHz so the agent's 16 kHz audio plays with NO
    // per-chunk resampling (resampling many tiny buffers warbles over time) and
    // the mic is captured at 16 kHz directly. Fall back if the browser refuses
    // a forced rate.
    try {
      audioCtx = new AudioContext({ sampleRate: TARGET_RATE });
    } catch (_) {
      audioCtx = new AudioContext();
    }
    console.log("[playback] AudioContext sampleRate =", audioCtx.sampleRate);
    if (audioCtx.state === "suspended") await audioCtx.resume();
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 },
    });
  } catch (err) {
    console.error("[devconsole] mic/audio init failed:", err);
    setStatus(
      "microphone blocked (" + (err && err.name ? err.name : err) +
      ") — click the site icon in the address bar, set Microphone to Allow, then click Start again"
    );
    if (audioCtx) { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
    return;  // do NOT open the websocket when the mic is unavailable
  }
  playCursor = audioCtx.currentTime;
  $("start").classList.add("stop");
  $("start").textContent = "Stop";
  start();
};
</script>
</body>
</html>
