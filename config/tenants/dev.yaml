# Dev / smoke-test tenant.
#
# Set these environment variables locally (e.g. in a gitignored .env, or
# your shell rc) before running live tests or placing a real call. The list
# below matches the providers this tenant actually uses (see the pipeline
# block: Deepgram streaming STT, Gemini LLM, Sarvam TTS, Stringee telephony):
#
#   export TENANT_DEV_DEEPGRAM_KEY=...           # Deepgram streaming STT (dev console live path)
#   export TENANT_DEV_GROQ_KEY=gsk_...           # Groq Whisper STT (batch / telephony fallback)
#   export TENANT_DEV_GEMINI_KEY=AIza...         # Google Gemini LLM (active)
#   export TENANT_DEV_SARVAM_KEY=...             # Sarvam TTS
#   export STRINGEE_API_KEY_SID=SK....           # Stringee telephony (read by the adapter directly,
#   export STRINGEE_API_KEY_SECRET=...           #   not via *_env; region-scoped — see STRINGEE_BASE_URL)
#   export TENANT_DEV_WEBHOOK_SECRET=...         # used to verify inbound webhook signatures
#
# To grant tenant API access, also set:
#   export TENANT_DEV_API_TOKENS=dev-token-1,dev-token-2
#
# Optional (only if you flip telephony.provider back to twilio for comparison):
#   export TENANT_DEV_TWILIO_SID=AC...           # Twilio Account SID
#   export TENANT_DEV_TWILIO_TOKEN=...           # Twilio Auth Token
#
# The telephony answer/event/status webhooks must point at a publicly reachable
# host (the deployed app, or ngrok during local dev — see docs/live-testing.md).
# Update ``webhook_base_url`` below before placing a real call.

id: t_dev
slug: dev
name: Dev / Smoke Test
status: active
default_language: hi
webhook_secret_env: TENANT_DEV_WEBHOOK_SECRET

pipeline:
  stt:
    provider: groq
    model: whisper-large-v3
    language: hi-IN
    api_key_env: TENANT_DEV_GROQ_KEY

  # Streaming STT for the dev console (Deepgram live). When present, the browser
  # bridge streams audio live and uses Deepgram endpointing; pipeline.stt (Groq)
  # remains the batch fallback. Telephony bridges ignore this block.
  stt_streaming:
    provider: deepgram
    model: nova-2          # nova-2 hi validated; nova-3 multi also works
    language: hi
    endpointing: 400       # ms of trailing silence -> speech_final. 200 was too
                           # eager — natural mid-sentence pauses (breath/thinking)
                           # tripped it and the agent replied to a fragment while the
                           # user was still talking ("agent interrupted me"). 400
                           # waits out short pauses; raise toward 500-600 if it still
                           # cuts off, lower toward 300 if turn-taking feels laggy.
    utterance_end_ms: 1000
    api_key_env: TENANT_DEV_DEEPGRAM_KEY

  llm:
    provider: gemini
    # gemini-2.5-flash is the sweet spot: good dialogue quality with the best
    # latency of the capable models (flash-lite was faster but low quality;
    # 3.5-flash was higher quality but slower).
    model: gemini-2.5-flash
    temperature: 0.5
    # The JSON response envelope (response_text + slots + metadata, in Hindi)
    # needs well over 256 tokens; a tight cap truncates it into invalid JSON.
    max_tokens: 1024
    response_format: json
    api_key_env: TENANT_DEV_GEMINI_KEY
    # --- Claude alternative (swap back to compare): Haiku 4.5, fast/cheap tier.
    #     Adapter forces the JSON envelope via a '{' assistant prefill.
    # provider: anthropic
    # model: claude-haiku-4-5
    # temperature: 0.5
    # max_tokens: 1024
    # response_format: json
    # api_key_env: TENANT_DEV_ANTHROPIC_KEY

  tts:
    provider: sarvam
    language: hi-IN
    voice_id: anushka
    speed: 1.0
    api_key_env: TENANT_DEV_SARVAM_KEY

  telephony:
    provider: stringee
    from_number: "+918204268005"   # Stringee caller-ID
    webhook_base_url: "https://p01--voice-bot--9f4wlvz8tgw7.code.run/api/v1/telephony"
    # Stringee auth is read from env STRINGEE_API_KEY_SID / STRINGEE_API_KEY_SECRET
    # by the adapter directly; the *_env fields below are Twilio-shaped and unused
    # for stringee (kept so flipping back to Twilio only needs the provider line).
    account_sid_env: TENANT_DEV_TWILIO_SID
    auth_token_env: TENANT_DEV_TWILIO_TOKEN

  vector_store:
    provider: faiss

compliance:
  calling_hours_start: "09:00"
  calling_hours_end: "21:00"
  dnd_check_enabled: true
  ai_disclosure: true

crm:
  kind: fake

whatsapp:
  provider: fake

# Numbers this tenant owns. Inbound/answer webhooks resolve to this tenant by
# matching the call's number against this list (EXACT match — no normalization),
# so the Stringee number is listed in both +E.164 and bare forms until the live
# call confirms which format Stringee's webhook sends.
phone_numbers:
  - "+15705255679"
  - "+918618795697"
  - "+918204268005"   # Stringee caller-ID (+E.164 form)
  - "918204268005"    # Stringee caller-ID (bare form — exact-match hedge)
